    <title>Bundled Page</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: #f4f5f7;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      }
      #__bundler_loading {
        position: fixed;
        bottom: 20px;
        right: 20px;
        font:
          13px/1.4 -apple-system,
          BlinkMacSystemFont,
          sans-serif;
        color: #666;
        background: #fff;
        padding: 8px 14px;
        border-radius: 8px;
        box-shadow: 0 1px 4px rgba(0, 0, 0, 0.12);
        z-index: 10000;
      }
      #__bundler_thumbnail {
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #f4f5f7;
        z-index: 9999;
      }
      #__bundler_thumbnail svg {
        width: 100%;
        height: 100%;
        object-fit: contain;
      }
      #__bundler_placeholder {
        color: #999;
        font-size: 14px;
      }

    <script>
      document.addEventListener("DOMContentLoaded", async function () {
        const loading = document.getElementById("__bundler_loading");
        function setStatus(msg) {
          if (loading) loading.textContent = msg;
        }

        const FONT_MIME =
          /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
        const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
        function toBase64(bytes) {
          let bin = "";
          for (let i = 0; i < bytes.length; i += 0x8000) {
            bin += String.fromCharCode.apply(
              null,
              bytes.subarray(i, i + 0x8000),
            );
          }
          return btoa(bin);
        }

        // Error sink persists across replaceWith since it's on window, not the DOM.
        window.addEventListener(
          "error",
          function (e) {
            // Failed resource loads (CSP-blocked links, scripts, images) fire plain
            // events at the element — warn only; real JS errors carry message/error.
            if (!e.message && !e.error && e.target && e.target !== window) {
              console.warn(
                "[bundle] resource failed to load:",
                e.target.tagName,
                String(e.target.src || e.target.href || ""),
              );
              return;
            }
            var p = document.body || document.documentElement;
            var d =
              document.getElementById("__bundler_err") ||
              p.appendChild(document.createElement("div"));
            d.id = "__bundler_err";
            d.style.cssText =
              "position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto";
            d.textContent =
              (d.textContent ? d.textContent + String.fromCharCode(10) : "") +
              "[bundle] " +
              (e.message || e.type) +
              (e.filename
                ? " (" + e.filename.slice(0, 60) + ":" + e.lineno + ")"
                : "");
          },
          true,
        );

        try {
          const manifestEl = document.querySelector(
            'script[type="__bundler/manifest"]',
          );
          const templateEl = document.querySelector(
            'script[type="__bundler/template"]',
          );
          if (!manifestEl || !templateEl) {
            setStatus("Error: missing bundle data");
            console.error(
              "[bundler] Missing script tags — manifestEl:",
              !!manifestEl,
              "templateEl:",
              !!templateEl,
            );
            return;
          }

          const manifest = JSON.parse(manifestEl.textContent);
          let template = JSON.parse(templateEl.textContent);

          const uuids = Object.keys(manifest);
          setStatus("Unpacking " + uuids.length + " assets...");

          const blobUrls = {};
          const resourceBlobs = {};
          await Promise.all(
            uuids.map(async (uuid) => {
              const entry = manifest[uuid];
              try {
                const binaryStr = atob(entry.data);
                const bytes = new Uint8Array(binaryStr.length);
                for (let i = 0; i < binaryStr.length; i++)
                  bytes[i] = binaryStr.charCodeAt(i);

                let finalBytes = bytes;
                if (entry.compressed) {
                  if (typeof DecompressionStream !== "undefined") {
                    const ds = new DecompressionStream("gzip");
                    const writer = ds.writable.getWriter();
                    const reader = ds.readable.getReader();
                    writer.write(bytes);
                    writer.close();
                    const chunks = [];
                    let totalLen = 0;
                    while (true) {
                      const { done, value } = await reader.read();
                      if (done) break;
                      chunks.push(value);
                      totalLen += value.length;
                    }
                    finalBytes = new Uint8Array(totalLen);
                    let offset = 0;
                    for (const chunk of chunks) {
                      finalBytes.set(chunk, offset);
                      offset += chunk.length;
                    }
                  } else {
                    console.warn(
                      "DecompressionStream not available, asset " +
                        uuid +
                        " may not render",
                    );
                  }
                }

                if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
                  // Strict artifact hosts allow font-src data: but not blob:.
                  blobUrls[uuid] =
                    "data:" +
                    entry.mime +
                    ";base64," +
                    (entry.compressed ? toBase64(finalBytes) : entry.data);
                } else {
                  const blob = new Blob([finalBytes], { type: entry.mime });
                  blobUrls[uuid] = URL.createObjectURL(blob);
                  resourceBlobs[blobUrls[uuid]] = blob;
                }
              } catch (err) {
                console.error("Failed to decode asset " + uuid + ":", err);
                const blob = new Blob([], { type: entry.mime });
                blobUrls[uuid] = URL.createObjectURL(blob);
                resourceBlobs[blobUrls[uuid]] = blob;
              }
            }),
          );

          const extResEl = document.querySelector(
            'script[type="__bundler/ext_resources"]',
          );
          const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
          const resourceMap = {};
          for (const entry of extResources) {
            if (blobUrls[entry.uuid])
              resourceMap[entry.id] = blobUrls[entry.uuid];
          }

          // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
          // consumers read these Blobs directly. Survives the swap like the error sink.
          window.__resourceBlobs = resourceBlobs;

          setStatus("Rendering...");
          for (const uuid of uuids)
            template = template.split(uuid).join(blobUrls[uuid]);

          // Strip integrity + crossorigin — blob URLs from a file:// document inherit
          // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
          // The manifest bytes are ours; SRI protects against CDN compromise, not this.
          template = template
            .replace(/\s+integrity="[^"]*"/gi, "")
            .replace(/\s+crossorigin="[^"]*"/gi, "");

          const resourceScript =
            "<script>window.__resources = " +
            JSON.stringify(resourceMap).replace(/<\//g, "<\\/") +
            ";</" +
            "script>";
          // Inject after <head> so the DOCTYPE stays first; prepending the script
          // would push the parser into quirks mode. DOMParser always emits a <head>
          // (synthesizing one if the source HTML omitted it) but may carry
          // attributes through, so match the full opening tag. slice() rather than
          // replace() keeps us clear of $-pattern substitution in resourceScript.
          const headOpen = template.match(/<head[^>]*>/i);
          if (headOpen) {
            const i = headOpen.index + headOpen[0].length;
            template =
              template.slice(0, i) + resourceScript + template.slice(i);
          }

          // Parse the template and swap the root element. Scripts inserted via
          // DOMParser/replaceWith are inert per spec — re-create each with
          // createElement so they execute, awaiting onload for src scripts to
          // preserve ordering (React before ReactDOM before Babel before text/babel).
          const doc = new DOMParser().parseFromString(template, "text/html");
          document.documentElement.replaceWith(doc.documentElement);
          const dead = Array.from(document.scripts);
          for (const old of dead) {
            const s = document.createElement("script");
            for (const a of old.attributes) s.setAttribute(a.name, a.value);
            s.textContent = old.textContent;
            // text/babel scripts with a src: read and inline. transformScriptTags
            // does XHR against the src, but blob:null/ from a file:// origin is
            // silently dropped. Inlining makes it a plain inline babel script,
            // which transformScriptTags handles unconditionally.
            if ((s.type === "text/babel" || s.type === "text/jsx") && s.src) {
              const pre = resourceBlobs[s.src.split("#")[0]];
              s.textContent = pre
                ? await pre.text()
                : await (await fetch(s.src)).text();
              s.removeAttribute("src");
            }
            const p = s.src
              ? new Promise(function (r) {
                  s.onload = s.onerror = r;
                })
              : null;
            old.replaceWith(s);
            if (p) await p;
          }
          // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
          // which fired before we swapped the document. Trigger manually if present.
          if (
            window.Babel &&
            typeof window.Babel.transformScriptTags === "function"
          ) {
            window.Babel.transformScriptTags();
          }
        } catch (err) {
          setStatus("Error unpacking: " + err.message);
          console.error("Bundle unpack error:", err);
        }
      });
    </script>

serif;color:#656B67;margin:0 0 22px;\">Fields marked with an asterisk are required.<\u002Fp>\n          <form sc-camel-no-validate=\"{{ yes }}\" sc-camel-on-submit=\"{{ onSubmit }}\">\n\n            <div style=\"margin-bottom:20px;\">\n              <label for=\"pr-name\" style=\"display:block;font:600 14px/1.35 'Hanken Grotesk',sans-serif;color:#1A211E;margin:0 0 7px;\">Full name <span aria-hidden=\"true\" style=\"color:#1B2D5C;\">*<\u002Fspan><\u002Flabel>\n              <input id=\"pr-name\" name=\"full_name\" type=\"text\" autocomplete=\"name\" aria-required=\"true\" aria-invalid=\"{{ ariaName }}\" aria-describedby=\"pr-name-err\" value=\"{{ nameVal }}\" sc-camel-on-change=\"{{ onName }}\" style=\"display:block;width:100%;font:400 16px/1.4 'Hanken Grotesk',sans-serif;color:#1A211E;background:#FFFFFF;border:1px solid #CFD3CE;border-radius:8px;padding:13px 14px;\" style-focus=\"{ borderColor:'#1B2D5C', boxShadow:'0 0 0 3px rgba(27,45,92,0.18)' }\">\n              <sc-if value=\"{{ errName }}\" hint-placeholder-val=\"{{ false }}\"><p id=\"pr-name-err\" role=\"alert\" style=\"font:500 13px/1.45 'Hanken Grotesk',sans-serif;color:#B42318;margin:7px 0 0;\">{{ errName }}<\u002Fp><\u002Fsc-if>\n            <\u002Fdiv>\n\n            <div style=\"margin-bottom:20px;\">\n              <label for=\"pr-email\" style=\"display:block;font:600 14px/1.35 'Hanken Grotesk',sans-serif;color:#1A211E;margin:0 0 7px;\">Email address <span aria-hidden=\"true\" style=\"color:#1B2D5C;\">*<\u002Fspan><\u002Flabel>\n              <input id=\"pr-email\" name=\"email\" type=\"email\" inputmode=\"email\" autocomplete=\"email\" aria-required=\"true\" aria-invalid=\"{{ ariaEmail }}\" aria-describedby=\"pr-email-help pr-email-err\" value=\"{{ emailVal }}\" sc-camel-on-change=\"{{ onEmail }}\" style=\"display:block;width:100%;font:400 16px/1.4 'Hanken Grotesk',sans-serif;color:#1A211E;background:#FFFFFF;border:1px solid #CFD3CE;border-radius:8px;padding:13px 14px;\" style-focus=\"{ borderColor:'#1B2D5C', boxShadow:'0 0 0 3px rgba(27,45,92,0.18)' }\">\n              <p id=\"pr-email-help\" style=\"font:400 13px/1.45 'Hanken Grotesk',sans-serif;color:#656B67;margin:7px 0 0;\">Use the email associated with your order, if you have one.<\u002Fp>\n              <sc-if value=\"{{ errEmail }}\" hint-placeholder-val=\"{{ false }}\"><p id=\"pr-email-err\" role=\"alert\" style=\"font:500 13px/1.45 'Hanken Grotesk',sans-serif;color:#B42318;margin:7px 0 0;\">{{ errEmail }}<\u002Fp><\u002Fsc-if>\n            <\u002Fdiv>\n\n            <div style=\"margin-bottom:20px;\">\n              <label for=\"pr-state\" style=\"display:block;font:600 14px/1.35 'Hanken Grotesk',sans-serif;color:#1A211E;margin:0 0 7px;\">State of residence <span aria-hidden=\"true\" style=\"color:#1B2D5C;\">*<\u002Fspan><\u002Flabel>\n              <div style=\"position:relative;\">\n                <sc-raw-select id=\"pr-state\" name=\"state\" aria-required=\"true\" aria-invalid=\"{{ ariaState }}\" aria-describedby=\"pr-state-err\" value=\"{{ stateVal }}\" sc-camel-on-change=\"{{ onState }}\" style=\"display:block;width:100%;font:400 16px/1.4 'Hanken Grotesk',sans-serif;color:#1A211E;background:#FFFFFF;border:1px solid #CFD3CE;border-radius:8px;padding:13px 40px 13px 14px;appearance:none;-webkit-appearance:none;cursor:pointer;\" style-focus=\"{ borderColor:'#1B2D5C', boxShadow:'0 0 0 3px rgba(27,45,92,0.18)' }\">\n                  <option value=\"\" disabled=\"\">Select your state<\u002Foption>\n                  <sc-for list=\"{{ states }}\" as=\"st\" hint-placeholder-count=\"6\"><option value=\"{{ st.name }}\">{{ st.name }}<\u002Foption><\u002Fsc-for>\n                <\u002Fsc-raw-select>\n                <span aria-hidden=\"true\" style=\"position:absolute;right:15px;top:50%;transform:translateY(-50%);color:#565C58;font-size:11px;pointer-events:none;\">▼<\u002Fspan>\n              <\u002Fdiv>\n              <sc-if value=\"{{ errState }}\" hint-placeholder-val=\"{{ false }}\"><p id=\"pr-state-err\" role=\"alert\" style=\"font:500 13px/1.45 'Hanken Grotesk',sans-serif;color:#B42318;margin:7px 0 0;\">{{ errState }}<\u002Fp><\u002Fsc-if>\n            <\u002Fdiv>\n\n            <fieldset aria-describedby=\"pr-types-err\" style=\"border:0;margin:0 0 20px;padding:0;min-width:0;\">\n              <legend style=\"display:block;font:600 14px/1.35 'Hanken Grotesk',sans-serif;color:#1A211E;margin:0 0 2px;padding:0;\">Request type <span aria-hidden=\"true\" style=\"color:#1B2D5C;\">*<\u002Fspan><\u002Flegend>\n              <p style=\"font:400 13px/1.45 'Hanken Grotesk',sans-serif;color:#656B67;margin:0 0 10px;\">Select at least one.<\u002Fp>\n              <div style=\"display:flex;flex-direction:column;gap:8px;\">\n                <sc-for list=\"{{ requestTypes }}\" as=\"rt\" hint-placeholder-count=\"5\">\n                  <label for=\"{{ rt.id }}\" style=\"display:flex;align-items:flex-start;gap:12px;padding:13px 14px;border:1px solid #E2E4E0;border-radius:8px;background:#FFFFFF;cursor:pointer;transition:border-color .12s ease,background .12s ease;\" style-hover=\"{ borderColor:'#CFD3CE', background:'#FBFBFA' }\">\n                    <input type=\"checkbox\" id=\"{{ rt.id }}\" name=\"request_type\" value=\"{{ rt.id }}\" checked=\"{{ rt.checked }}\" sc-camel-on-change=\"{{ rt.onToggle }}\" style=\"width:20px;height:20px;margin:1px 0 0;accent-color:#1B2D5C;flex:none;cursor:pointer;\">\n                    <span style=\"font:400 15px/1.45 'Hanken Grotesk',sans-serif;color:#1A211E;\">{{ rt.label }}<\u002Fspan>\n                  <\u002Flabel>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n              <sc-if value=\"{{ errTypes }}\" hint-placeholder-val=\"{{ false }}\"><p id=\"pr-types-err\" role=\"alert\" style=\"font:500 13px/1.45 'Hanken Grotesk',sans-serif;color:#B42318;margin:10px 0 0;\">{{ errTypes }}<\u002Fp><\u002Fsc-if>\n            <\u002Ffieldset>\n\n            <div style=\"margin-bottom:26px;\">\n              <label for=\"pr-details\" style=\"display:block;font:600 14px/1.35 'Hanken Grotesk',sans-serif;color:#1A211E;margin:0 0 7px;\">Additional details <span style=\"font-weight:400;color:#8A908C;font-size:13px;\">(optional)<\u002Fspan><\u002Flabel>\n              <textarea id=\"pr-details\" name=\"details\" rows=\"4\" value=\"{{ detailsVal }}\" sc-camel-on-change=\"{{ onDetails }}\" style=\"display:block;width:100%;font:400 16px/1.5 'Hanken Grotesk',sans-serif;color:#1A211E;background:#FFFFFF;border:1px solid #CFD3CE;border-radius:8px;padding:13px 14px;min-height:112px;resize:vertical;\" style-focus=\"{ borderColor:'#1B2D5C', boxShadow:'0 0 0 3px rgba(27,45,92,0.18)' }\"><\u002Ftextarea>\n            <\u002Fdiv>\n\n            <button type=\"submit\" style=\"appearance:none;width:100%;max-width:420px;display:inline-flex;align-items:center;justify-content:center;gap:8px;font:600 16px/1 'Hanken Grotesk',sans-serif;color:#FFFFFF;background:#1B2D5C;border:1px solid #1B2D5C;border-radius:8px;padding:16px 24px;cursor:pointer;transition:background .15s ease,transform .06s ease;\" style-hover=\"{ background:'#24386E', borderColor:'#24386E' }\" style-active=\"{ transform:'translateY(1px)' }\">Submit request<\u002Fbutton>\n          <\u002Fform>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n      <sc-if value=\"{{ showSubmitted }}\" hint-placeholder-val=\"{{ false }}\">\n        <div id=\"form-confirm\" tabindex=\"-1\" role=\"status\" aria-live=\"polite\" style=\"background:#EAEEF6;border:1px solid #C7D3E8;border-radius:12px;padding:22px;animation:revEnter .25s ease both;outline:none;\">\n          <div aria-hidden=\"true\" style=\"display:inline-flex;align-items:center;justify-content:center;width:30px;height:30px;border-radius:999px;background:#1B2D5C;color:#FFFFFF;font:700 15px/1 'Hanken Grotesk',sans-serif;margin-bottom:12px;\">✓<\u002Fdiv>\n          <h3 style=\"font:600 18px/1.3 'Hanken Grotesk',sans-serif;color:#1A211E;margin:0 0 8px;\">Request received<\u002Fh3>\n          <p style=\"font:400 15px/1.6 'Hanken Grotesk',sans-serif;color:#353B37;margin:0;max-width:60ch;\">Your request has been received. We will verify and respond within 45 days to the email you provided. If we need more time as permitted by law, we will let you know within that window.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fsection>\n\n    <div aria-hidden=\"true\" style=\"height:1px;background:#E2E4E0;margin:36px 0 24px;\"><\u002Fdiv>\n\n    <p style=\"font:400 14px/1.65 'Hanken Grotesk',sans-serif;color:#565C58;margin:0;max-width:64ch;\">Requests can also be made by emailing <a href=\"mailto:support@reviveteeth.com\">support@reviveteeth.com<\u002Fa>. For full details on what we collect, how we use it, and your rights, see our <a href=\"/pages/privacy-policy\">Privacy Policy<\u002Fa>. Exercising your privacy rights will never affect your order, pricing, or the service you receive.<\u002Fp>\n  <\u002Fmain>\n\n  <footer style=\"border-top:1px solid #E2E4E0;background:#F4F5F7;\">\n    <nav aria-label=\"Policies\" style=\"max-width:688px;margin:0 auto;padding:24px 24px 40px;display:flex;flex-wrap:wrap;gap:12px 22px;\">\n      <a href=\"/pages/privacy-policy\" style=\"font:400 13px/1.4 'Hanken Grotesk',sans-serif;color:#1B2D5C;text-decoration:none;\" style-hover=\"{ color:'#12213F' }\">Privacy Policy<\u002Fa>\n      <a href=\"/pages/terms-of-service\" style=\"font:400 13px/1.4 'Hanken Grotesk',sans-serif;color:#1B2D5C;text-decoration:none;\" style-hover=\"{ color:'#12213F' }\">Terms of Service<\u002Fa>\n      <a href=\"/pages/refund-remake-returns-policy\" style=\"font:400 13px/1.4 'Hanken Grotesk',sans-serif;color:#1B2D5C;text-decoration:none;\" style-hover=\"{ color:'#12213F' }\">Refund, Remake and Returns Policy<\u002Fa>\n      <a href=\"/pages/shipping-policy\" style=\"font:400 13px/1.4 'Hanken Grotesk',sans-serif;color:#1B2D5C;text-decoration:none;\" style-hover=\"{ color:'#12213F' }\">Shipping Policy<\u002Fa>\n      <a href=\"/pages/disclaimer\" style=\"font:400 13px/1.4 'Hanken Grotesk',sans-serif;color:#1B2D5C;text-decoration:none;\" style-hover=\"{ color:'#12213F' }\">Disclaimer<\u002Fa>\n      <a href=\"/pages/privacy-opt-out\" aria-current=\"page\" style=\"font:400 13px/1.4 'Hanken Grotesk',sans-serif;color:#1B2D5C;text-decoration:none;\">Do Not Sell or Share My Personal Information<\u002Fa>\n    <\u002Fnav>\n  <\u002Ffooter>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{\n  &quot;previewState&quot;: { &quot;editor&quot;: &quot;enum&quot;, &quot;default&quot;: &quot;Default&quot;, &quot;options&quot;: [&quot;Default&quot;, &quot;Opted out on this browser&quot;, &quot;Request submitted&quot;], &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;Review states&quot;, &quot;label&quot;: &quot;Preview state&quot; },\n  &quot;gpcDetected&quot;: { &quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: false, &quot;tsType&quot;: &quot;boolean&quot;, &quot;section&quot;: &quot;Review states&quot;, &quot;label&quot;: &quot;Simulate GPC signal&quot; },\n  &quot;showErrorsDemo&quot;: { &quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: false, &quot;tsType&quot;: &quot;boolean&quot;, &quot;section&quot;: &quot;Review states&quot;, &quot;label&quot;: &quot;Preview form errors&quot; }\n}\">\nclass Component extends DCLogic {\n  state = {\n    optedOut: false,\n    submitted: false,\n    attempted: false,\n    fullName: '',\n    email: '',\n    stateRes: '',\n    details: '',\n    types: { sale: false, access: false, correct: false, del: false, health: false },\n  };\n\n  US_STATES = ['Alabama','Alaska','Arizona','Arkansas','California','Colorado','Connecticut','Delaware','District of Columbia','Florida','Georgia','Hawaii','Idaho','Illinois','Indiana','Iowa','Kansas','Kentucky','Louisiana','Maine','Maryland','Massachusetts','Michigan','Minnesota','Mississippi','Missouri','Montana','Nebraska','Nevada','New Hampshire','New Jersey','New Mexico','New York','North Carolina','North Dakota','Ohio','Oklahoma','Oregon','Pennsylvania','Rhode Island','South Carolina','South Dakota','Tennessee','Texas','Utah','Vermont','Virginia','Washington','West Virginia','Wisconsin','Wyoming'];\n\n  TYPE_DEFS = [\n    { key: 'sale', label: 'Opt out of the sale or sharing of my personal information' },\n    { key: 'access', label: 'Access a copy of my personal information' },\n    { key: 'correct', label: 'Correct my personal information' },\n    { key: 'del', label: 'Delete my personal information' },\n    { key: 'health', label: 'Withdraw consent for the collection or sharing of my consumer health data (Washington residents)' },\n  ];\n\n  validate() {\n    const e = {};\n    if (!this.state.fullName.trim()) e.name = 'Please enter your full name.';\n    const em = this.state.email.trim();\n    if (!em) e.email = 'Please enter your email address.';\n    else if (!/^[^\\s@]+@[^\\s@]+\\.[^\\s@]+$/.test(em)) e.email = 'Please enter a valid email address.';\n    if (!this.state.stateRes) e.stateRes = 'Please select your state of residence.';\n    if (!Object.values(this.state.types).some(Boolean)) e.types = 'Please select at least one request type.';\n    return e;\n  }\n\n  handleOptOut = () => {\n    this.setState({ optedOut: true }, () => {\n      const el = document.getElementById('optout-confirm');\n      if (el) el.focus();\n    });\n  };\n\n  handleSubmit = (ev) => {\n    if (ev && ev.preventDefault) ev.preventDefault();\n    const errors = this.validate();\n    this.setState({ attempted: true }, () => {\n      if (Object.keys(errors).length === 0) {\n        this.setState({ submitted: true }, () => {\n          const el = document.getElementById('form-confirm');\n          if (el) el.focus();\n        });\n      } else {\n        const order = ['name', 'email', 'stateRes', 'types'];\n        const idMap = { name: 'pr-name', email: 'pr-email', stateRes: 'pr-state', types: 'pr-type-sale' };\n        const first = order.find((k) => errors[k]);\n        const el = first && document.getElementById(idMap[first]);\n        if (el) el.focus();\n      }\n    });\n  };\n\n  renderVals() {\n    const p = this.props || {};\n    const preview = p.previewState || 'Default';\n    const optedOut = preview === 'Opted out on this browser' || this.state.optedOut;\n    const submitted = preview === 'Request submitted' || this.state.submitted;\n    const attempted = this.state.attempted || !!p.showErrorsDemo;\n    const errors = attempted ? this.validate() : {};\n    const gpcActive = !!p.gpcDetected;\n\n    const states = this.US_STATES.map((s) => ({ name: s }));\n    const requestTypes = this.TYPE_DEFS.map((t) => ({\n      id: 'pr-type-' + t.key,\n      label: t.label,\n      checked: !!this.state.types[t.key],\n      onToggle: () => this.setState((st) => ({ types: { ...st.types, [t.key]: !st.types[t.key] } })),\n    }));\n\n    return {\n      yes: true,\n      states,\n      requestTypes,\n      nameVal: this.state.fullName,\n      emailVal: this.state.email,\n      stateVal: this.state.stateRes,\n      detailsVal: this.state.details,\n      onName: (e) => this.setState({ fullName: e.target.value }),\n      onEmail: (e) => this.setState({ email: e.target.value }),\n      onState: (e) => this.setState({ stateRes: e.target.value }),\n      onDetails: (e) => this.setState({ details: e.target.value }),\n      onOptOut: this.handleOptOut,\n      onSubmit: this.handleSubmit,\n      errName: errors.name || '',\n      errEmail: errors.email || '',\n      errState: errors.stateRes || '',\n      errTypes: errors.types || '',\n      ariaName: errors.name ? 'true' : 'false',\n      ariaEmail: errors.email ? 'true' : 'false',\n      ariaState: errors.stateRes ? 'true' : 'false',\n      showDevice: !optedOut,\n      showOptedOut: optedOut,\n      showForm: !submitted,\n      showSubmitted: submitted,\n      gpcActive,\n      gpcNotActive: !gpcActive,\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
    </script>
  </body>
</html>
